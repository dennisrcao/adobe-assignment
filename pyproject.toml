[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = [
    ".eggs", ".git", ".mypy_cache", ".venv", "_build",
    "build", "dist", "node_modules",
]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "B", "A", "C4", "UP", "SIM", "RUF",
]
ignore = [
    "E501",
    "UP006", "UP007", "UP045", "UP046", "UP047",
]

[tool.ruff.lint.per-file-ignores]
"apps/api/src/routes/*.py" = ["B008", "A002"]
"**/tests/*.py" = ["A001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
